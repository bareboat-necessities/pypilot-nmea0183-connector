name: linux

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: pypilot-nmea0183-connector
      - uses: actions/checkout@v4
        with:
          repository: bareboat-necessities/pypilot-data-model
          path: pypilot-data-model
      - name: Configure
        working-directory: pypilot-nmea0183-connector
        run: cmake -S . -B build
      - name: Build
        working-directory: pypilot-nmea0183-connector
        run: cmake --build build --parallel
      - name: Test
        working-directory: pypilot-nmea0183-connector
        run: ctest --test-dir build --output-on-failure
